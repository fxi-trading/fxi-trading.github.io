<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX Intelligence - Live Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a;--bg2:#111827;--card:#141c2e;--accent:#3b82f6;--green:#10b981;--gold:#f59e0b;--red:#ef4444;--text:#f1f5f9;--text2:#94a3b8;--border:#1e293b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.demo-container{max-width:500px;margin:0 auto;padding:20px;min-height:100vh}
.demo-header{text-align:center;padding:20px 0 30px}
.demo-header h1{font-size:1.3rem;font-weight:900}
.demo-header h1 em{font-style:normal;color:var(--accent)}
.demo-header p{color:var(--text2);font-size:.8rem;margin-top:4px}
.phase-bar{display:flex;gap:4px;margin-bottom:30px}
.phase-dot{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .5s}
.phase-dot.active{background:var(--accent)}
.phase-dot.done{background:var(--green)}
.scene{display:none;animation:fadeIn .6s ease}
.scene.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.signal-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px}
.signal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.signal-pair{font-size:1.4rem;font-weight:900}
.signal-badge{padding:6px 16px;border-radius:20px;font-weight:700;font-size:.85rem}
.signal-badge.buy{background:rgba(16,185,129,.15);color:var(--green)}
.signal-badge.sell{background:rgba(239,68,68,.15);color:var(--red)}
.signal-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.9rem}
.signal-row:last-child{border:none}
.signal-row .label{color:var(--text2)}
.signal-row .value{font-weight:700;font-family:'JetBrains Mono',monospace}
.filter-list{display:flex;flex-direction:column;gap:8px}
.filter-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:.85rem;opacity:0;transform:translateX(-20px);transition:all .4s}
.filter-item.show{opacity:1;transform:translateX(0)}
.filter-item .icon{font-size:1.1rem;width:24px;text-align:center}
.filter-item .name{flex:1}
.filter-item .result{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:.8rem}
.filter-item.pass{border-color:rgba(16,185,129,.3)}
.filter-item.pass .result{color:var(--green)}
.filter-item.fail{border-color:rgba(239,68,68,.3)}
.filter-item.fail .result{color:var(--red)}
.struct-bar{display:flex;align-items:center;gap:8px;margin:6px 0}
.struct-label{width:100px;font-size:.8rem;color:var(--text2)}
.struct-gauge{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.struct-fill{height:100%;border-radius:4px;transition:width 1s ease;width:0}
.struct-fill.pos{background:var(--green)}
.struct-fill.neg{background:var(--red)}
.struct-fill.neutral{background:var(--text2)}
.struct-val{width:40px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700}
.telegram-msg{background:#1a2744;border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid var(--accent);font-size:.85rem;line-height:1.7;opacity:0;transform:scale(.95);transition:all .5s}
.telegram-msg.show{opacity:1;transform:scale(1)}
.telegram-msg .tg-header{font-weight:700;margin-bottom:8px;font-size:.95rem}
.telegram-msg .tg-row{display:flex;justify-content:space-between}
.telegram-msg .tg-label{color:var(--text2)}
.telegram-msg .tg-value{font-family:'JetBrains Mono',monospace;font-weight:700}
.telegram-msg.approved{border-left-color:var(--green)}
.monitor{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
.monitor-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.monitor-status{padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:700}
.monitor-status.open{background:rgba(59,130,246,.15);color:var(--accent)}
.monitor-status.tp{background:rgba(16,185,129,.15);color:var(--green)}
.pnl-display{text-align:center;padding:20px 0}
.pnl-display .pnl-value{font-size:2.4rem;font-weight:900;font-family:'JetBrains Mono',monospace;transition:all .3s}
.pnl-display .pnl-value.pos{color:var(--green)}
.pnl-display .pnl-value.neg{color:var(--red)}
.pnl-display .pnl-label{color:var(--text2);font-size:.8rem;margin-top:4px}
.price-bar{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text2);margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.price-bar .current{color:var(--text);font-weight:700}
.progress-wrap{margin:20px 0}
.progress-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text2);margin-bottom:6px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .3s}
.scene-title{font-size:1.1rem;font-weight:900;margin-bottom:4px}
.scene-subtitle{color:var(--text2);font-size:.8rem;margin-bottom:20px}
.scene-step{color:var(--accent);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.btn-row{display:flex;gap:10px;margin-top:24px}
.btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-skip{background:var(--card);color:var(--text2);border:1px solid var(--border)}
.timestamp{color:var(--text2);font-size:.7rem;font-family:'JetBrains Mono',monospace;margin-bottom:12px}
.summary-card{background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(59,130,246,.1));border:1px solid rgba(16,185,129,.2);border-radius:16px;padding:24px;text-align:center}
.summary-card .big{font-size:2.8rem;font-weight:900;color:var(--green);font-family:'JetBrains Mono',monospace}
.summary-card .desc{color:var(--text2);font-size:.85rem;margin-top:4px}
.summary-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.summary-stat{background:var(--card);border-radius:10px;padding:14px;text-align:center}
.summary-stat .val{font-size:1.2rem;font-weight:900;font-family:'JetBrains Mono',monospace}
.summary-stat .lbl{font-size:.7rem;color:var(--text2);margin-top:2px}
</style>
</head>
<body>
<div class="demo-container">
  <div class="demo-header">
    <h1><em>FX Intelligence</em> Live Demo</h1>
    <p>AIがトレードする様子をリアルタイムで体験</p>
  </div>
  <div class="phase-bar"><div class="phase-dot" id="p1"></div><div class="phase-dot" id="p2"></div><div class="phase-dot" id="p3"></div><div class="phase-dot" id="p4"></div><div class="phase-dot" id="p5"></div><div class="phase-dot" id="p6"></div></div>

  <div class="scene active" id="scene1"></div>
  <div class="scene" id="scene2"></div>
  <div class="scene" id="scene3"></div>
  <div class="scene" id="scene4"></div>
  <div class="scene" id="scene5"></div>
  <div class="scene" id="scene6"></div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ランダムシナリオ定義

  },
  {

    digits: 3, pipSize: 0.01, lotSize: 0.30, regime: 'Trending (ADX 28)',
    slDist: 11.0, tpDist: 18.3, slPrice: 159.982, tpPrice: 157.042,
    pnlPerPip: 300, holdTime: '4h 15m',

  },
  {
    pair: 'EURJPY', side: 'BUY', score: 38, interval: '4H', price: 187.664, prefix: '',
    digits: 3, pipSize: 0.01, lotSize: 0.28, regime: 'Ranging (ADX 18)',
    slDist: 11.2, tpDist: 18.7, slPrice: 186.544, tpPrice: 189.534,
    pnlPerPip: 280, holdTime: '8h 03m',
    indicators: {ema:'Bullish (+1)',rsi:'Oversold (32)',macd:'Bullish (+1)',stoch:'Oversold (15)',bb:'Lower Band (+1)',ichi:'In Cloud (0)'},
    struct: {sr:2,pa:1,fib:1,rn:0,sw:0,total:4},
    priceSteps: [187.66,187.72,187.68,187.80,187.92,188.05,188.18,188.32,188.50,188.68,188.85,189.10,189.35,189.53],
  },
  {
    pair: 'GBPJPY', side: 'BUY', score: 45, interval: '1D', price: 215.274, prefix: '',
    digits: 3, pipSize: 0.01, lotSize: 0.18, regime: 'Trending (ADX 35)',
    slDist: 17.8, tpDist: 29.7, slPrice: 213.494, tpPrice: 218.244,
    pnlPerPip: 180, holdTime: '12h 38m',
    indicators: {ema:'Bullish (+1)',rsi:'Neutral (55)',macd:'Bull Cross (+2)',stoch:'Neutral (50)',bb:'Expansion (+2)',ichi:'Above Cloud (+1)'},
    struct: {sr:1,pa:0,fib:1,rn:1,sw:1,total:4},
    priceSteps: [215.27,215.40,215.55,215.38,215.70,215.95,216.20,216.50,216.85,217.10,217.45,217.80,218.05,218.24],
  },
  {
    pair: 'EURUSD', side: 'BUY', score: 28, interval: 'ALL', price: 1.16965, prefix: '',
    digits: 5, pipSize: 0.0001, lotSize: 0.19, regime: 'Ranging (ADX 16)',
    slDist: 21.2, tpDist: 35.3, slPrice: 1.14845, tpPrice: 1.20495,
    pnlPerPip: 285, holdTime: '9h 22m',
    indicators: {ema:'Bullish (+1)',rsi:'Neutral (48)',macd:'Bullish (+1)',stoch:'Neutral (42)',bb:'Squeeze (0)',ichi:'Above Cloud (+1)'},
    struct: {sr:1,pa:1,fib:0,rn:1,sw:1,total:4},
    priceSteps: [1.1697,1.1702,1.1698,1.1710,1.1718,1.1725,1.1735,1.1748,1.1760,1.1775,1.1790,1.1810,1.1830,1.1850],
  },
  {
    pair: 'AUDJPY', side: 'BUY', score: 40, interval: '4H', price: 94.117, prefix: '',
    digits: 3, pipSize: 0.01, lotSize: 0.31, regime: 'Trending (ADX 26)',
    slDist: 8.5, tpDist: 14.2, slPrice: 93.267, tpPrice: 95.537,
    pnlPerPip: 310, holdTime: '5h 50m',
    indicators: {ema:'Bullish (+1)',rsi:'Neutral (54)',macd:'Bull Cross (+2)',stoch:'Neutral (55)',bb:'Above Mid (+1)',ichi:'Above Cloud (+1)'},
    struct: {sr:1,pa:1,fib:1,rn:0,sw:1,total:4},
    priceSteps: [94.12,94.18,94.25,94.20,94.32,94.45,94.58,94.70,94.85,94.98,95.10,95.28,95.42,95.54],
  },
  {
    pair: 'GOLD', side: 'SELL', score: -48, interval: '1H', price: 3342.80, prefix: '$',
    digits: 2, pipSize: 0.1, lotSize: 0.02, regime: 'Transitional (ADX 19)',
    slDist: 42.5, tpDist: 70.8, slPrice: 3385.30, tpPrice: 3271.00,
    pnlPerPip: 30, holdTime: '7h 10m',
    indicators: {ema:'Bearish (-1)',rsi:'Overbought (72)',macd:'Bear Momentum (-1)',stoch:'Overbought (85)',bb:'Upper Band (-1)',ichi:'In Cloud (0)'},
    struct: {sr:-2,pa:-1,fib:-1,rn:0,sw:-1,total:-5},
    priceSteps: [3342.8,3338.5,3335.0,3340.2,3330.8,3322.5,3315.0,3308.2,3300.5,3292.0,3285.5,3278.0,3273.5,3271.0],
  },
  {
    pair: 'USDJPY', side: 'BUY', score: 35, interval: '4H', price: 155.450, prefix: '',
    digits: 3, pipSize: 0.01, lotSize: 0.25, regime: 'Ranging (ADX 17)',
    slDist: 9.5, tpDist: 15.8, slPrice: 154.500, tpPrice: 157.030,
    pnlPerPip: 250, holdTime: '5h 28m',
    indicators: {ema:'Bullish (+1)',rsi:'Oversold (30)',macd:'Bullish (+1)',stoch:'Oversold (12)',bb:'Lower Band (+1)',ichi:'In Cloud (0)'},
    struct: {sr:2,pa:1,fib:1,rn:1,sw:0,total:5},
    priceSteps: [155.45,155.52,155.60,155.55,155.68,155.80,155.95,156.10,156.28,156.45,156.60,156.80,156.95,157.03],
  },
];

// ランダム選択
const S = SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)];
const isBuy = S.side === 'BUY';
const sideColor = isBuy ? 'var(--green)' : 'var(--red)';
const sideClass = isBuy ? 'buy' : 'sell';

// 時刻生成
const hours = [0,1,2,3,4,6,8,9,10,12,13,15,16,18,19,20];
const randHour = hours[Math.floor(Math.random() * hours.length)];
const randMin = Math.floor(Math.random() * 60);
const ts = `2026-04-21 ${String(randHour).padStart(2,'0')}:${String(randMin).padStart(2,'0')}:03 UTC`;

function fmt(v) { return S.prefix + v.toFixed(S.digits); }

// P&L 計算
const entryPrice = S.priceSteps[0];
const exitPrice = S.priceSteps[S.priceSteps.length - 1];
const pipsGained = Math.abs(exitPrice - entryPrice) / S.pipSize;
const finalPnl = Math.round(pipsGained * S.pnlPerPip);

// ━━━ Scene 1: Signal ━━━
document.getElementById('scene1').innerHTML = `
  <div class="scene-step">Step 1 / 6</div>
  <div class="scene-title">TradingView からシグナル受信</div>
  <div class="scene-subtitle">6つのテクニカル指標 x 4つの時間軸でスコアリング</div>
  <div class="timestamp">${ts}</div>
  <div class="signal-card">
    <div class="signal-header">
      <span class="signal-pair">${S.pair}</span>
      <span class="signal-badge ${sideClass}">${S.side}</span>
    </div>
    <div class="signal-row"><span class="label">Score</span><span class="value" style="color:${sideColor}">${S.score > 0 ? '+' : ''}${S.score}%</span></div>
    <div class="signal-row"><span class="label">Interval</span><span class="value">${S.interval}</span></div>
    <div class="signal-row"><span class="label">Price</span><span class="value">${fmt(S.price)}</span></div>
    <div class="signal-row"><span class="label">EMA</span><span class="value" style="color:${S.indicators.ema.includes('+') ? 'var(--green)' : S.indicators.ema.includes('-') ? 'var(--red)' : 'var(--text2)'}">${S.indicators.ema}</span></div>
    <div class="signal-row"><span class="label">RSI</span><span class="value" style="color:${S.indicators.rsi.includes('Oversold') ? 'var(--green)' : S.indicators.rsi.includes('Overbought') ? 'var(--red)' : 'var(--text2)'}">${S.indicators.rsi}</span></div>
    <div class="signal-row"><span class="label">MACD</span><span class="value" style="color:${S.indicators.macd.includes('Bull') ? 'var(--green)' : S.indicators.macd.includes('Bear') ? 'var(--red)' : 'var(--text2)'}">${S.indicators.macd}</span></div>
    <div class="signal-row"><span class="label">Stochastic</span><span class="value" style="color:${S.indicators.stoch.includes('Oversold') ? 'var(--green)' : S.indicators.stoch.includes('Overbought') ? 'var(--red)' : 'var(--text2)'}">${S.indicators.stoch}</span></div>
    <div class="signal-row"><span class="label">Bollinger</span><span class="value" style="color:${S.indicators.bb.includes('+') ? 'var(--green)' : S.indicators.bb.includes('-') ? 'var(--red)' : 'var(--text2)'}">${S.indicators.bb}</span></div>
    <div class="signal-row"><span class="label">Ichimoku</span><span class="value" style="color:${S.indicators.ichi.includes('+') ? 'var(--green)' : S.indicators.ichi.includes('-') ? 'var(--red)' : 'var(--text2)'}">${S.indicators.ichi}</span></div>
  </div>
  <div class="btn-row"><button class="btn btn-primary" onclick="goScene(2)">AI分析を開始 &rarr;</button></div>`;

// ━━━ Scene 2: AI Filter ━━━
const spread = (1.2 + Math.random() * 1.5).toFixed(1);
document.getElementById('scene2').innerHTML = `
  <div class="scene-step">Step 2 / 6</div>
  <div class="scene-title">12のAIフィルタで自動判定</div>
  <div class="scene-subtitle">負けパターンに該当しないか、1つずつチェック</div>
  <div class="filter-list" id="filterList">
    <div class="filter-item" data-delay="300"><span class="icon">1</span><span class="name">Score Cap (60%)</span><span class="result">--</span></div>
    <div class="filter-item" data-delay="600"><span class="icon">2</span><span class="name">曜日フィルタ</span><span class="result">--</span></div>
    <div class="filter-item" data-delay="900"><span class="icon">3</span><span class="name">時間帯フィルタ (UTC ${String(randHour).padStart(2,'0')})</span><span class="result">--</span></div>
    <div class="filter-item" data-delay="1200"><span class="icon">4</span><span class="name">スプレッド (${spread} pips)</span><span class="result">--</span></div>
    <div class="filter-item" data-delay="1500"><span class="icon">5</span><span class="name">経済カレンダー</span><span class="result">--</span></div>
    <div class="filter-item" data-delay="1800"><span class="icon">6</span><span class="name">金曜クローズ制限</span><span class="result">--</span></div>
    <div class="filter-item" data-delay="2100"><span class="icon">7</span><span class="name">Interval フィルタ</span><span class="result">--</span></div>
    <div class="filter-item" data-delay="2400"><span class="icon">8</span><span class="name">Stochastic 過買い</span><span class="result">--</span></div>
    <div class="filter-item" data-delay="2700"><span class="icon">9</span><span class="name">MACD 方向一致</span><span class="result">--</span></div>
    <div class="filter-item" data-delay="3000"><span class="icon">10</span><span class="name">レジーム検知 (${S.regime})</span><span class="result">--</span></div>
    <div class="filter-item" data-delay="3300"><span class="icon">11</span><span class="name">ファンダメンタルズ</span><span class="result">--</span></div>
    <div class="filter-item" data-delay="3600"><span class="icon">12</span><span class="name">構造分析 (S/R, PA, Fib)</span><span class="result">--</span></div>
  </div>
  <div class="progress-wrap"><div class="progress-label"><span>判定中...</span><span id="filterProgress">0/12</span></div><div class="progress-bar"><div class="progress-fill" id="filterBar" style="width:0%"></div></div></div>
  <div class="btn-row"><button class="btn btn-primary" id="btn2" onclick="goScene(3)" style="display:none">構造分析の詳細 &rarr;</button></div>`;

// ━━━ Scene 3: Structure ━━━
const st = S.struct;
function structColor(v) { return v > 0 ? 'var(--green)' : v < 0 ? 'var(--red)' : 'var(--text2)'; }
function structClass(v) { return v > 0 ? 'pos' : v < 0 ? 'neg' : 'neutral'; }
function structPct(v, max) { return Math.round((Math.abs(v) / max) * 50 + 50); }
const structConfirm = (isBuy && st.total > 0) || (!isBuy && st.total < 0);

document.getElementById('scene3').innerHTML = `
  <div class="scene-step">Step 3 / 6</div>
  <div class="scene-title">構造分析（プロの視点）</div>
  <div class="scene-subtitle">インジケータでは見えない「チャートの構造」を分析</div>

// ━━━ Navigation ━━━
let currentScene = 1;

function goScene(n) {
  document.getElementById('scene' + currentScene).classList.remove('active');
  document.getElementById('scene' + n).classList.add('active');
  for (let i = 1; i <= 6; i++) {
    const dot = document.getElementById('p' + i);
    dot.classList.remove('active', 'done');
    if (i < n) dot.classList.add('done');
    if (i === n) dot.classList.add('active');
  }
  currentScene = n;
  if (n === 2) runFilters();
  if (n === 3) runStructure();
  if (n === 4) runTelegram();
  if (n === 5) runMonitor();
}

function runFilters() {
  const items = document.querySelectorAll('.filter-item');
  const results = ['PASS','PASS','PASS','PASS','PASS','PASS','PASS','PASS','SKIP','PASS','PASS','PASS'];
  items.forEach((item, i) => {
    setTimeout(() => {
      item.classList.add('show');
      const r = results[i];
      item.querySelector('.result').textContent = r;
      item.classList.add(r === 'PASS' ? 'pass' : 'pass');
      document.getElementById('filterProgress').textContent = (i+1) + '/12';
      document.getElementById('filterBar').style.width = ((i+1)/12*100) + '%';
      if (i === items.length - 1) setTimeout(() => { document.getElementById('btn2').style.display = 'block'; }, 500);
    }, parseInt(item.dataset.delay));
  });
}

function runStructure() {
  const vals = [
    { id: 'sr-fill', v: st.sr, max: 2 },
    { id: 'pa-fill', v: st.pa, max: 2 },
    { id: 'fib-fill', v: st.fib, max: 1 },
    { id: 'rn-fill', v: st.rn, max: 1 },
    { id: 'sw-fill', v: st.sw, max: 1 },
    { id: 'total-fill', v: st.total, max: 7 },
  ];
  vals.forEach((f, i) => {
    setTimeout(() => {
      const pct = Math.round((Math.abs(f.v) / f.max) * 50 + (f.v === 0 ? 0 : 20));
      document.getElementById(f.id).style.width = Math.min(95, pct) + '%';
    }, 300 * (i + 1));
  });
}

function runTelegram() {
  setTimeout(() => document.getElementById('tg1').classList.add('show'), 500);
  setTimeout(() => document.getElementById('tg2').classList.add('show'), 1500);
}

function runMonitor() {
  const prices = S.priceSteps;
  let step = 0;
  const totalPips = S.tpDist;
  const interval = setInterval(() => {
    if (step >= prices.length) {
      clearInterval(interval);
      document.getElementById('monitorStatus').textContent = 'TP HIT';
      document.getElementById('monitorStatus').classList.remove('open');
      document.getElementById('monitorStatus').classList.add('tp');
      document.getElementById('btn5').style.display = 'block';
      return;
    }
    const price = prices[step];
    const pips = Math.abs(price - entryPrice) / S.pipSize;
    const dir = isBuy ? (price > entryPrice ? 1 : -1) : (price < entryPrice ? 1 : -1);
    const pnl = Math.round(pips * S.pnlPerPip * dir);
    const tpPct = Math.min(100, Math.round(pips / totalPips * 100 * dir));

    document.getElementById('pnlValue').textContent = (pnl >= 0 ? '+' : '') + pnl.toLocaleString();
    document.getElementById('pnlValue').className = 'pnl-value ' + (pnl >= 0 ? 'pos' : 'neg');
    document.getElementById('currentPrice').textContent = 'Now: ' + fmt(price);
    document.getElementById('tpProgress').textContent = Math.max(0, tpPct) + '%';
    document.getElementById('tpBar').style.width = Math.max(0, tpPct) + '%';

    const minutes = step * 30;
    const h = randHour + Math.floor(minutes / 60);
    const m = (randMin + minutes) % 60;
    document.getElementById('monitorTime').textContent = '監視中... ' + (h % 24).toString().padStart(2,'0') + ':' + m.toString().padStart(2,'0') + ':33 UTC';
    step++;
  }, 600);
}

document.getElementById('p1').classList.add('active');
